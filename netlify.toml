# Netlify configuration for BrightSupport Next.js static site
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLARITY_ID,NEXT_PUBLIC_GA_MEASUREMENT_ID,NEXT_PUBLIC_EMAILJS_SERVICE_ID,NEXT_PUBLIC_EMAILJS_PUBLIC_KEY,NEXT_PUBLIC_EMAILJS_TEMPLATE_ID"

# Redirects and headers are handled via public/_redirects and public/_headers
# which get copied to the out/ directory during build
